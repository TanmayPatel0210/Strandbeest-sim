    <title>The Strandbeest Sim</title>

  <body id="body">
      <div id="canvasWrap">
          <p style="font-size: 20px; top: 0; font-family: monospace;color: antiquewhite;" >2D representation of multiple legs</p>
          <canvas id="trailCanvas" width="960" height="770" ></canvas>
          <canvas id="myCanvas" width="960" height="770" ></canvas>

        <h1 style="color: antiquewhite;">Controls</h1  >
        <label for="slider">Speed</label>
        <input type="range" id="slider" min="0.01" max="0.07" step="0.001" value="0.025">
      
        <button id="pauseBtn" style="color: antiquewhite; font-size: larger;">Pause/Play</button>

        <h3>----------------------------<br>Adujst the speed and watch <br> the movement closely this is <br> just a 2D representation of <br> how multiple legs move <br> simultaneously. <br> Try to visualize the actual <br> machine shown on the home <br> page and connect the dots...</h3>

    </div>
