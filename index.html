<!DOCTYPE html>
<html>
  <head>
    <title>The Strandbeest Sim</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div style="position: relative;">
      <canvas id="trailCanvas" width="600" height="600" style="position: absolute; top: 0; left: 0;"></canvas>
      <canvas id="myCanvas" width="600" height="600" style="position: absolute; top: 0; left: 0;"></canvas>

    <div id="controls">

      <input type="range" id="slider" min="0.01" max="0.1" step="0.001" value="0.04">
      <br><br>
      <button id="pauseBtn">Pause/Play</button>
      <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
      <a href="simulation.html"><h1>BACK</h1></a>

  </body>
</html>
